name: Security Agent

on:
  workflow_call:  

permissions:
  contents: read
  security-events: write

jobs:

  #################################################################
  # 1. DOMAIN VALIDATION AGENT
  #################################################################

  validate-domain-policy:

    name: Validate Commit Domains

    runs-on: ubuntu-latest

    steps:

      #############################################################
      # Checkout Repository
      #############################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #############################################################
      # Validate Commit Email Domains
      #############################################################

      - name: Validate Commit Email Domains

        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

          #########################################################
          # Allowed Domains
          #########################################################

          ALLOWED_DOMAINS: "gmail.com usefulbi.com users.noreply.github.com yahoo.com"

        run: |

          echo "Running Rule-Based Domain Agent"

          EMAILS=$(git log ${BASE_SHA}..${HEAD_SHA} \
          --pretty=format:'%ae')

          echo "Emails Found:"
          echo "$EMAILS"

          INVALID_FOUND=0

          for email in $EMAILS
          do

            DOMAIN=$(echo "$email" | cut -d'@' -f2)

            if [[ " $ALLOWED_DOMAINS " =~ " $DOMAIN " ]]; then

              echo "VALID EMAIL -> $email"

            else

              echo "INVALID EMAIL -> $email"

              INVALID_FOUND=1

            fi

          done

          #########################################################
          # Block PR if Invalid Domain Found
          #########################################################

          if [ "$INVALID_FOUND" -eq 1 ]; then

            echo ""
            echo "❌ DOMAIN VALIDATION FAILED"

            exit 1

          fi

          echo ""
          echo "✅ DOMAIN VALIDATION SUCCESSFUL"

  #################################################################
  # 2. MODULE LICENSE COMPLIANCE CHECKER
  #################################################################

  module-license-checker:
    name: Module License Compliance Checker
    runs-on: ubuntu-latest
    needs: validate-domain-policy

    steps:

      #################################################################
      # Checkout
      #################################################################
      - name: Checkout Repository
        uses: actions/checkout@v4

      #################################################################
      # Setup Python
      #################################################################
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      #################################################################
      # Validate Dependency Licenses WITHOUT Installing
      #################################################################
      - name: Validate Package Licenses
        shell: bash
        run: |

          echo "Running Module License Compliance Checker..."

          python -m pip install --upgrade pip
          pip install requests

          RESTRICTED_LICENSES=("GPL" "GPL-2.0" "GPL-3.0" "GNU General Public License" "AGPL" "AGPL-3.0" "Affero General Public License" "GNU Affero General Public License" "LGPL" "LGPL-2.0" "LGPL-2.1" "LGPL-3.0" "GNU Lesser General Public License" "SSPL" "Server Side Public License" "CPAL" "Common Public Attribution License" "EUPL" "European Union Public License" "OSL" "Open Software License" "Sleepycat License" "QPL" "Q Public License" "RPL" "Reciprocal Public License" "EPL-1.0" "Eclipse Public License 1.0" "MPL-1.1" "Mozilla Public License 1.1" "CC-BY-SA" "Creative Commons Attribution Share Alike" "Commons Clause" "PolyForm")

          RESTRICTED_FOUND=0
          UNKNOWN_FOUND=0

          if [ ! -f requirements.txt ]; then
            echo "❌ requirements.txt not found"
            exit 1
          fi

          while IFS= read -r package || [ -n "$package" ]; do

            # Skip empty lines/comments
            if [[ -z "$package" || "$package" =~ ^# ]]; then
              continue
            fi

            # Extract package name only
            PACKAGE_NAME=$(echo "$package" | sed 's/[<>=!].*//' | xargs)

            echo "Checking package: $PACKAGE_NAME"

            LICENSE=$(python -c "import requests; pkg='$PACKAGE_NAME'; url=f'https://pypi.org/pypi/{pkg}/json'; data=requests.get(url, timeout=10).json(); info=data.get('info', {}); license_name=info.get('license', ''); classifiers=info.get('classifiers', []); license_name = license_name or ' '.join([c for c in classifiers if 'License' in c]); print(license_name if license_name else 'UNKNOWN')")

            echo "License: $LICENSE"

            for restricted in "${RESTRICTED_LICENSES[@]}"; do

              if echo "$LICENSE" | grep -iq "$restricted"; then
                echo "❌ Restricted License Detected -> $restricted in $PACKAGE_NAME"
                RESTRICTED_FOUND=1
              fi

            done

            # Detect unknown licenses
            if echo "$LICENSE" | grep -iq "UNKNOWN"; then
              echo "⚠️ Unknown license -> $PACKAGE_NAME"
              UNKNOWN_FOUND=1
            fi

          done < requirements.txt

          echo "====================================="

          if [ "$RESTRICTED_FOUND" -eq 1 ]; then

            echo "❌ MODULE LICENSE COMPLIANCE FAILED"
            echo "❌ Restricted licenses detected"
            echo "❌ Pull Request will be BLOCKED"

            exit 1

          fi

          if [ "$UNKNOWN_FOUND" -eq 1 ]; then

            echo "⚠️ Unknown licenses detected"
            echo "⚠️ Manual review recommended"

          fi

          echo "✅ MODULE LICENSE COMPLIANCE SUCCESSFUL"

          
  #################################################################
  # 3. TALISMAN SECRET SCAN
  #################################################################

  talisman-secret-scan:

    name: Talisman Secret Scan

    needs: module-license-checker

    runs-on: ubuntu-latest

    steps:

      #############################################################
      # Checkout Repository
      #############################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #############################################################
      # Install Talisman
      #############################################################

      - name: Install Talisman
        run: |

          curl -Lo talisman https://github.com/thoughtworks/talisman/releases/latest/download/talisman_linux_amd64

          chmod +x talisman

          sudo mv talisman /usr/local/bin/

      #############################################################
      # Run Talisman Secret Scan
      #############################################################

      - name: Run Talisman Secret Scan

        run: |

          echo "Getting changed files..."

          git diff --name-only origin/main...HEAD > changed_files.txt

          echo ""
          echo "Files identified for scanning:"
          cat changed_files.txt

          #########################################################
          # Initialize Failure Flag
          #########################################################

          TALISMAN_FAILED=0

          #########################################################
          # Scan Each Changed File
          #########################################################

          while read file; do

            if [ -f "$file" ]; then

              echo ""
              echo "========================================="
              echo "Scanning file -> $file"
              echo "========================================="

              talisman --scan \
                --ignoreHistory \
                --pattern="$file" \
                || TALISMAN_FAILED=1

            fi

          done < changed_files.txt

          #########################################################
          # Final Validation
          #########################################################

          if [ "$TALISMAN_FAILED" -eq 1 ]; then

            echo ""
            echo "============= TALISMAN REPORT ============="

            find talisman_report -type f | xargs cat

            echo ""
            echo "❌ TALISMAN SECRET SCAN FAILED"

            exit 1

          fi

          echo ""
          echo "✅ TALISMAN SECRET SCAN PASSED"

      #########################################################
      # Additional Custom Secret Checks
      #########################################################

      - name: Additional Custom Secret Checks

        run: |

          echo ""
          echo "Running Additional Secret Validation..."

          #####################################################
          # Scan ONLY source files
          #####################################################

          EXCLUDED_DIRS="--exclude-dir=.git \
          --exclude-dir=.github \
          --exclude-dir=node_modules \
          --exclude-dir=venv \
          --exclude-dir=.venv \
          --exclude-dir=.idea \
          --exclude-dir=__pycache__"

          #####################################################
          # JWT Token Detection
          #####################################################

          if grep -RInE \
            $EXCLUDED_DIRS \
            'eyJ[a-zA-Z0-9_-]+\.[a-zA-Z0-9._-]+\.[a-zA-Z0-9._-]+' \
            . ; then

            echo ""
            echo "❌ JWT TOKEN DETECTED"

            exit 1

          fi

          #####################################################
          # Base64 Secret Detection
          #####################################################

          if grep -RInE \
            $EXCLUDED_DIRS \
            '[A-Za-z0-9+/]{20,}={0,2}' \
            . ; then

            echo ""
            echo "❌ Suspicious Base64 Secret Detected"

            exit 1

          fi

          echo ""
          echo "✅ Additional Secret Validation Passed"   

          #################################################
          # Hardcoded Credential Detection
          #################################################

          if grep -RInE \
            $EXCLUDED_DIRS \
            '(password|passwd|pwd|secret|token|api_key|apikey|access_key|auth|credential)\s*=\s*["'\''][^"'\'']{6,}["'\'']' \
            . ; then

            echo ""
            echo "❌ Hardcoded Credential Detected"

            exit 1

          fi

          #################################################
          # Generic Password Pattern Detection
          #################################################
          if grep -RInE \
            $EXCLUDED_DIRS \
            '["'\'']([A-Z][a-zA-Z]+[@#\$%!][0-9]{2,}|[Pp]assword[@#\$%!]?[0-9]+)["'\'']' \
            . ; then

            echo ""
            echo "❌ Generic Password Pattern Detected"

            exit 1

          fi

          
  ################################################################
  # 4. SEMGREP SAST SCAN
  #################################################################

  semgrep-security-scan:

    name: Semgrep SAST Scan

    needs: talisman-secret-scan

    runs-on: ubuntu-latest

    steps:

      #############################################################
      # Checkout Repository
      #############################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #############################################################
      # Setup Python
      #############################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      #############################################################
      # Install Semgrep
      #############################################################

      - name: Install Semgrep
        run: |

          python -m pip install --upgrade pip

          pip install semgrep

      #############################################################
      # Create Custom Semgrep Rules
      #############################################################

      - name: Create Custom Semgrep Rules
        run: |

          cat <<EOF > custom-semgrep-rules.yml
          rules:

            #########################################################
            # Dangerous eval()
            #########################################################

            - id: dangerous-eval-detection

              pattern: eval(...)

              message: "Use of eval() detected. Potential Remote Code Execution vulnerability."

              severity: ERROR

              languages:
                - python

              metadata:
                category: security
                confidence: HIGH
                impact: HIGH

            #########################################################
            # Dangerous subprocess shell=True
            #########################################################

            - id: dangerous-subprocess-shell

              pattern: subprocess.run(..., shell=True)

              message: "shell=True detected in subprocess.run(). Potential command injection risk."

              severity: ERROR

              languages:
                - python

              metadata:
                category: security
                confidence: HIGH
                impact: HIGH

            #########################################################
            # Dangerous os.system()
            #########################################################

            - id: dangerous-os-system

              pattern: os.system(...)

              message: "os.system() detected. Potential command injection vulnerability."

              severity: ERROR

              languages:
                - python

              metadata:
                category: security
                confidence: HIGH
                impact: HIGH

            #########################################################
            # Unsafe YAML Load
            #########################################################

            - id: dangerous-yaml-load

              pattern: yaml.load(...)

              message: "yaml.load() detected without SafeLoader. Potential arbitrary code execution risk."

              severity: ERROR

              languages:
                - python

              metadata:
                category: security
                confidence: HIGH
                impact: HIGH
                
            #########################################################
            #Dangerous exec()
            #########################################################

            - id: dangerous-exec-usage

              pattern: exec(...) 
              message: "exec() detected. Potential arbitrary code execution." 
              severity: ERROR 
              languages: 
                - python 
              metadata: 
                category: security 
                confidence: HIGH 
                impact: HIGH
                
            #########################################################
            # SQL Injection Risk
            #########################################################


            - id: sql-injection-risk

              pattern: '"SELECT * FROM users WHERE name = ''" + ...'

              message: "Potential SQL Injection using Python f-string detected."

              severity: ERROR

              languages:
                - python
              metadata: 
                category: security 
                confidence: HIGH 
                impact: HIGH

            #########################################################
            # Path Traversal Risk
            #########################################################

            - id: path-traversal-risk

              pattern: open("/tmp/" + ...)

              message: "Potential Path Traversal vulnerability detected."

              severity: ERROR

              languages:
                - python

              metadata:
                category: security
                confidence: HIGH
                impact: HIGH
                
            #########################################################
            # Weak Hash Algorithms
            #########################################################

            - id: weak-md5-usage

              pattern-either:
                - pattern: hashlib.md5(...)
                - pattern: hashlib.sha1(...)

              message: "Weak hashing algorithm detected. Use SHA-256 or stronger hashing."

              severity: WARNING

              languages:
                - python

              metadata:
                category: security
                confidence: MEDIUM
                impact: MEDIUM

          EOF

      #############################################################
      # Execute Semgrep SAST Scan
      #############################################################

      - name: Run Semgrep Security Scan
        run: |
          
          semgrep scan \
            --config=p/security-audit \
            --config=p/python \
            --config=p/owasp-top-ten \
            --config=custom-semgrep-rules.yml \
            --error
