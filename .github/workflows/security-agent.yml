name: Security Agent

on:
  workflow_call:  

permissions:
  contents: read
  security-events: write

jobs:

  #################################################################
  # 1. DOMAIN VALIDATION AGENT
  #################################################################

  validate-domain-policy:

    name: Validate Commit Domains

    runs-on: ubuntu-latest

    steps:

      #############################################################
      # Checkout Repository
      #############################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #############################################################
      # Validate Commit Email Domains
      #############################################################

      - name: Validate Commit Email Domains

        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

          #########################################################
          # Allowed Domains
          #########################################################

          ALLOWED_DOMAINS: "gmail.com usefulbi.com users.noreply.github.com"

        run: |

          echo "Running Rule-Based Domain Agent"

          EMAILS=$(git log ${BASE_SHA}..${HEAD_SHA} \
          --pretty=format:'%ae')

          echo "Emails Found:"
          echo "$EMAILS"

          INVALID_FOUND=0

          for email in $EMAILS
          do

            DOMAIN=$(echo "$email" | cut -d'@' -f2)

            if [[ " $ALLOWED_DOMAINS " =~ " $DOMAIN " ]]; then

              echo "VALID EMAIL -> $email"

            else

              echo "INVALID EMAIL -> $email"

              INVALID_FOUND=1

            fi

          done

          #########################################################
          # Block PR if Invalid Domain Found
          #########################################################

          if [ "$INVALID_FOUND" -eq 1 ]; then

            echo ""
            echo "❌ DOMAIN VALIDATION FAILED"

            exit 1

          fi

          echo ""
          echo "✅ DOMAIN VALIDATION SUCCESSFUL"
          
  #################################################################
  # 2. TALISMAN SECRET SCAN
  #################################################################

  talisman-secret-scan:

    name: Talisman Secret Scan

    needs: validate-domain-policy

    runs-on: ubuntu-latest

    steps:

      #############################################################
      # Checkout Repository
      #############################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #############################################################
      # Install Talisman
      #############################################################

      - name: Install Talisman
        run: |

          curl -Lo talisman https://github.com/thoughtworks/talisman/releases/latest/download/talisman_linux_amd64

          chmod +x talisman

          sudo mv talisman /usr/local/bin/

      #############################################################
      # Run Talisman Secret Scan
      #############################################################

      - name: Run Talisman Secret Scan

        run: |

          echo "Getting changed files..."

          git diff --name-only origin/main...HEAD > changed_files.txt

          mkdir talisman-temp

          while read file; do

            if [ -f "$file" ]; then

              mkdir -p "talisman-temp/$(dirname "$file")"

              cp "$file" "talisman-temp/$file"

            fi

          done < changed_files.txt

          echo "Files copied for scanning:"
          find talisman-temp -type f

          cd talisman-temp

          #########################################################
          # Execute Talisman
          #########################################################

          talisman --scan || true

          #########################################################
          # Print Report
          #########################################################

          echo ""
          echo "============= TALISMAN REPORT ============="

          find talisman_report -type f | xargs cat

          #########################################################
          # Detect Actual Findings
          #########################################################

          if grep -R '"filecontent":[1-9]' talisman_report > /dev/null; then

            echo ""
            echo "❌ TALISMAN SECRET SCAN FAILED"

            exit 1

          fi

          echo ""
          echo "✅ TALISMAN SECRET SCAN PASSED"
  ################################################################
  # 3. SEMGREP SAST SCAN
  #################################################################

  semgrep-security-scan:

    name: Semgrep SAST Scan

    needs: talisman-secret-scan

    runs-on: ubuntu-latest

    steps:

      #############################################################
      # Checkout Repository
      #############################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #############################################################
      # Setup Python
      #############################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      #############################################################
      # Install Semgrep
      #############################################################

      - name: Install Semgrep
        run: |

          python -m pip install --upgrade pip

          pip install semgrep

      #############################################################
      # Create Custom Semgrep Rules
      #############################################################

      - name: Create Custom Semgrep Rules
        run: |

          cat <<EOF > custom-semgrep-rules.yml
          rules:

            #########################################################
            # Dangerous eval()
            #########################################################

            - id: dangerous-eval-detection

              pattern: eval(...)

              message: "Use of eval() detected. Potential Remote Code Execution vulnerability."

              severity: ERROR

              languages:
                - python

              metadata:
                category: security
                confidence: HIGH
                impact: HIGH

            #########################################################
            # Dangerous subprocess shell=True
            #########################################################

            - id: dangerous-subprocess-shell

              pattern: subprocess.run(..., shell=True)

              message: "shell=True detected in subprocess.run(). Potential command injection risk."

              severity: ERROR

              languages:
                - python

              metadata:
                category: security
                confidence: HIGH
                impact: HIGH

            #########################################################
            # Dangerous os.system()
            #########################################################

            - id: dangerous-os-system

              pattern: os.system(...)

              message: "os.system() detected. Potential command injection vulnerability."

              severity: ERROR

              languages:
                - python

              metadata:
                category: security
                confidence: HIGH
                impact: HIGH

            #########################################################
            # Unsafe YAML Load
            #########################################################

            - id: dangerous-yaml-load

              pattern: yaml.load(...)

              message: "yaml.load() detected without SafeLoader. Potential arbitrary code execution risk."

              severity: ERROR

              languages:
                - python

              metadata:
                category: security
                confidence: HIGH
                impact: HIGH

            #########################################################
            # Weak Hash Algorithms
            #########################################################

            - id: weak-md5-usage

              pattern-either:
                - pattern: hashlib.md5(...)
                - pattern: hashlib.sha1(...)

              message: "Weak hashing algorithm detected. Use SHA-256 or stronger hashing."

              severity: WARNING

              languages:
                - python

              metadata:
                category: security
                confidence: MEDIUM
                impact: MEDIUM

          EOF

      #############################################################
      # Execute Semgrep SAST Scan
      #############################################################

      - name: Run Semgrep Security Scan
        run: |
          
          semgrep scan \
            --config=p/security-audit \
            --config=p/python \
            --config=p/owasp-top-ten \
            --config=custom-semgrep-rules.yml \
            --error
